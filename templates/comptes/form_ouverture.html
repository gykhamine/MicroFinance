{% extends "base/base.html" %}
{% block title %}Ouvrir un compte{% endblock %}
{% block page_title %}Ouvrir un compte{% endblock %}
{% block content %}
<div class="page-header"><div><h1>🏦 Ouvrir un compte</h1></div><a href="/clients/" class="btn btn-outline">← Clients</a></div>
<div class="card" style="max-width:600px;">
  <div class="card-body">
    <form method="post">
      {% csrf_token %}
      <div class="mb-2">
        <label class="form-label">Client *</label>
        <select name="client" class="form-select" required>
          <option value="">— Sélectionner —</option>
          {% for c in clients %}<option value="{{ c.pk }}">{{ c.utilisateur.get_full_name }} ({{ c.numero_client }})</option>{% endfor %}
        </select>
      </div>
      <div class="mb-2">
        <label class="form-label">Type de compte *</label>
        <select name="type_compte" class="form-select" required>
          <option value="">— Sélectionner —</option>
          {% for t in types %}
          <option value="{{ t.pk }}">{{ t.nom }} ({{ t.code }}) — Frais ouverture: {{ t.frais_ouverture|floatformat:0 }} FCFA</option>
          {% endfor %}
        </select>
      </div>
      <div class="mb-3"><label class="form-label">Notes</label><textarea name="notes" class="form-control" rows="2"></textarea></div>
      <button type="submit" class="btn btn-primary w-100">🏦 Ouvrir le compte</button>
    </form>
  </div>
</div>
{% endblock %}
